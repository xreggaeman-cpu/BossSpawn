<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Global Region Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Główny kontener aplikacji (górny pasek został całkowicie usunięty) -->
    <div id="container">

        <!-- Panel boczny (Sidebar) - zwężony o 40% -->
        <div id="sidebar">
            
            <!-- NOWOŚĆ: Zegar główny oraz status widoku przeniesione na szczyt lewego panelu -->
            <div id="sidebar-header">
                <div id="clock">00:00:00</div>
                <div id="viewDisplay">VIEW: <span id="viewLocationName">WORLD MAP</span></div>
            </div>

            <h2>Dungeons List</h2>
            
            <div class="dungeon-grid">
                <!-- GRUPA TALANDRE - ŻÓŁTA (1, 2, 3) -->
                <div class="sector-group sec-orange">
                    <div class="sector-title">TALANDRE</div>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'temple_of_truth', 'Temple of Truth', 0)">Temple of Truth</button>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'crimson_estate', 'Crimson Estate', 1)" style="margin-top: 4px;">Crimson Estate</button>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'bercant_estate', 'Bercant Estate', 2)" style="margin-top: 4px;">Bercant Estate</button>
                </div>
                
                <!-- GRUPA LASLAN - CZERWONA (4, 5) -->
                <div class="sector-group sec-red">
                    <div class="sector-title">LASLAN</div>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'syleus_abyss', 'Syleus\'s Abyss', 3)">Syleus's Abyss</button>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'shadowed_crypt', 'Shadowed Crypt', 4)" style="margin-top: 4px;">Shadowed Crypt</button>
                </div>

                <!-- GRUPA STONEGARD - NIEBIESKA (6, 7, 8) -->
                <div class="sector-group sec-blue">
                    <div class="sector-title">STONEGARD</div>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'temple_of_sylaveth', 'Temple of Sylaveth', 5)">Temple of Sylaveth</button>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'ant_nest', 'Ant Nest', 6)" style="margin-top: 4px;">Ant Nest</button>
                    <button class="dungeon-btn" onclick="showRegion('dungeon', 'sanctum_of_desire', 'Sanctum of Desire', 7)" style="margin-top: 4px;">Sanctum of Desire</button>
                </div>
            </div>

            <!-- Panel sterowania na samym dole sidebaru -->
            <div id="controlPanel">
                <h3>Selected Dungeon</h3>
                <div class="status-info-row">
                    <p>Name: <span id="curName">---</span></p>
                </div>
                <div class="status-info-row">
                    <p>Status: <span id="curStatus" style="color: #00e676;">READY</span></p>
                </div>
                <div class="status-info-row">
                    <p>Timer: <span id="curTimer">--:--:--</span></p>
                </div>
                <div class="status-info-row">
                    <p>Config: <span id="curConfigTime">4h (240m)</span></p>
                </div>

                <button id="killBtn">REGISTER KILL</button>

                <div class="btn-box">
                    <button id="editTimeBtn">COOLDOWN</button>
                    <button id="forceResetBtn">RESET</button>
                </div>
            </div>
        </div>

        <!-- Główny obszar mapy taktycznej -->
        <div id="mapWrapper">
            
            <!-- Pływający przycisk powrotu na mapę świata -->
            <button id="backToWorldBtn" class="hide-btn" onclick="showWorldMap()">← BACK TO WORLD MAP</button>

            <div class="map-responsive-container">
                <!-- Podstawowa Mapa Świata -->
                <img id="worldMap" src="images/worldmap.png" draggable="false">
                
                <!-- Dynamicznie podmieniana sub-mapa dla przybliżeń regionów i dungeonów -->
                <img id="subMap" src="" draggable="false" class="hide-submap">
                
                <!-- Warstwa SVG oparta na Twoich dokładnych współrzędnych (1150x1262) -->
                <svg id="svgOverlay" viewBox="0 0 1150 1262" preserveAspectRatio="none">
                    <!-- Region Talandre -->
                    <polygon id="region-yellow" class="map-zone zone-yellow" onclick="showRegion('region', 'talandre', 'Talandre')"

                    <!-- Region Nix -->

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
